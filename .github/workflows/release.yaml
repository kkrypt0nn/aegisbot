name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (must start with v)
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release new version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Validate version
        run: |
          [[ "${VERSION}" == v* ]] || (echo "Version must start with v" && exit 1)
        env:
          VERSION: ${{ inputs.version }}

      - name: Extract version without v
        run: echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_ENV
        env:
          VERSION: ${{ inputs.version }}

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
        env:
          VERSION: ${{ inputs.version }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
            go-version: 1.26.4

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ env.VERSION_NO_V }}
          tags: |
            ghcr.io/kkrypt0nn/aegisbot:latest
            ghcr.io/kkrypt0nn/aegisbot:${{ env.VERSION_NO_V }}
